services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: takeer_app_dev
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/node_modules
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - takeer_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  postgres:
    build:
      context: ./docker/postgres
      dockerfile: Dockerfile
    container_name: takeer_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-takeerms}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-takeerms}
    volumes:
      - takeer_revised_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - takeer_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_DATABASE:-takeerms}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: takeer_redis_dev
    restart: unless-stopped
    volumes:
      - redis_dev_data:/data
    ports:
      - "6380:6379"
    networks:
      - takeer_network

networks:
  takeer_network:
    driver: bridge

volumes:
  takeer_revised_data:
  redis_dev_data:
